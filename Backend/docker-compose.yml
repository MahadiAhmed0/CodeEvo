services:
  mongodb:
    image: mongo:latest
    container_name: auth-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: auth-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongodb_data:

