spring.application.name=IdentityService-test
server.max-http-request-header-size=64KB

spring.data.mongodb.uri=mongodb://localhost:27017/test_db

app.jwtSecret=test-secret-key-that-is-exactly-long-enough-for-hmac-sha-256-algorithm
app.jwtExpirationInMs=1800000
app.refreshExpirationInMs=604800000

spring.security.oauth2.client.registration.google.client-id=fake-google-id
spring.security.oauth2.client.registration.google.client-secret=fake-google-secret
spring.security.oauth2.client.registration.github.client-id=fake-github-id
spring.security.oauth2.client.registration.github.client-secret=fake-github-secret

app.cors.allowed-origins=http://localhost:3000

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

codeevo.project.encryption-key=12345678901234567890123456789012
codeevo.project.diagram-max-size-bytes=5242880

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

codeevo.websocket.allowed-origins=http://localhost:3000

codeevo.agent.supervisor.name=Test Supervisor
codeevo.agent.permission.timeout-seconds=300
codeevo.agent.rag.min-similarity=0.3
codeevo.agent.rag.auto-index=false

codeevo.agent.embedding.base-url=http://localhost:9999
codeevo.agent.embedding.api-key=fake-embedding-key
codeevo.agent.embedding.model=test-model

codeevo.github.client-id=fake-gh-client-id
codeevo.github.client-secret=fake-gh-client-secret
codeevo.github.redirect-uri=http://localhost:3000/auth/github/callback
codeevo.github.webhook-secret=fake-webhook-secret
codeevo.github.encryption-key=fake-encryption-key-for-tests
